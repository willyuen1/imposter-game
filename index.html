<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0e1a" />
  <title>Imposter</title>

  <!-- PWA / Add-to-Home-Screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Imposter" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <style>
    :root {
      --bg: #0b0e1a;
      --bg2: #11152a;
      --panel: #161a2b;
      --panel-2: #1f2540;
      --panel-3: #272e52;
      --text: #eef1ff;
      --muted: #98a0c0;
      --accent: #6c7bff;
      --accent-press: #5563e8;
      --good: #36d399;
      --danger: #ff5d6c;
      --line: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, var(--bg2), var(--bg));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 520px;
      padding: calc(env(safe-area-inset-top) + 22px) 20px calc(env(safe-area-inset-bottom) + 26px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .screen { display: flex; flex-direction: column; gap: 16px; flex: 1; }

    h1.title { font-size: 1.9rem; margin: 4px 0 0; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); margin: 0; line-height: 1.45; }
    .section-label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 6px 0 -4px;
    }
    .spacer { flex: 1; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .topbar .brand { font-size: 0.95rem; color: var(--muted); font-weight: 600; }

    /* Buttons */
    .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 17px 18px;
      font-size: 1.06rem;
      font-weight: 650;
      font-family: inherit;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      width: 100%;
      transition: transform 0.04s ease, opacity 0.15s ease, background 0.15s ease;
    }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); }
    .btn-primary:active { background: var(--accent-press); }
    .btn-secondary { background: var(--panel-2); border: 1px solid var(--line); }
    .btn-ghost { background: transparent; color: var(--muted); font-weight: 600; }
    .btn-ghost:active { background: rgba(255,255,255,0.04); }
    .btn-small { padding: 10px 14px; font-size: 0.9rem; width: auto; border-radius: 12px; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row > .btn { flex: 1; }

    /* Name inputs (setup) */
    .name-row { display: flex; gap: 10px; align-items: center; }
    .name-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 15px 16px;
      color: var(--text);
      font-size: 1.05rem;
      font-family: inherit;
    }
    .name-input::placeholder { color: #5b6488; }
    .name-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,123,255,0.25); }
    .remove-btn {
      flex: none;
      width: 46px; height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
    }
    .remove-btn:active { background: var(--panel-2); }

    /* Stepper */
    .stepper {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; padding: 10px 12px;
    }
    .stepper .label { display: flex; flex-direction: column; }
    .stepper .label .big { font-size: 1.1rem; font-weight: 650; }
    .stepper .label .hint { color: var(--muted); font-size: 0.82rem; }
    .stepper .controls { display: flex; align-items: center; gap: 12px; }
    .round-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--line); background: var(--panel-2);
      color: var(--text); font-size: 1.4rem; line-height: 1; cursor: pointer;
    }
    .round-btn:disabled { opacity: 0.35; }
    .stepper .count { font-size: 1.3rem; font-weight: 700; min-width: 24px; text-align: center; }

    .note { color: var(--muted); font-size: 0.88rem; line-height: 1.4; }
    .note.warn { color: #ffd166; }
    .buildtag { text-align: center; color: var(--muted); font-size: 0.74rem; opacity: 0.65; margin: 6px 0 0; }
    .roomcode {
      font-size: 2.8rem; font-weight: 800; letter-spacing: 0.28em;
      text-align: center; color: var(--accent); margin: 2px 0 4px; padding-left: 0.28em;
    }

    /* Menu (pass-around) */
    .progress { color: var(--muted); font-size: 0.9rem; }
    .name-btn {
      width: 100%; text-align: left;
      background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 16px; padding: 18px 18px;
      color: var(--text); font-size: 1.15rem; font-weight: 600;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      cursor: pointer;
    }
    .name-btn:active { transform: scale(0.99); }
    .name-btn.seen { opacity: 0.5; cursor: default; }
    .name-btn .tick { color: var(--good); font-weight: 700; }
    .name-btn .arrow { color: var(--muted); }
    .name-list { display: flex; flex-direction: column; gap: 10px; }

    /* Card */
    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 30px 24px;
      text-align: center;
      display: flex; flex-direction: column; gap: 16px;
      align-items: center;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
    .chip {
      display: inline-block;
      background: var(--panel-3);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .card .kicker { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .card .word { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; }
    .card .role { font-size: 1.5rem; font-weight: 800; }
    .card .clue { font-size: 1.35rem; font-weight: 600; line-height: 1.3; }
    .card .clue-label { color: var(--muted); font-size: 0.95rem; }
    .big-emoji { font-size: 2.6rem; }
    .word-emoji { font-size: 4.2rem; line-height: 1; }
    .avatar {
      width: 92px; height: 92px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem; font-weight: 800; color: #fff; margin: 0 auto;
    }
    .def { color: var(--muted); font-size: 1rem; line-height: 1.4; margin: 0; max-width: 34ch; }

    .center { text-align: center; }
    .reveal-name { font-size: 2.2rem; font-weight: 800; margin: 4px 0; }

    /* Speaking order */
    .order-list { display: flex; flex-direction: column; gap: 10px; }
    .order-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px 16px;
      font-size: 1.12rem; font-weight: 600;
    }
    .order-row .order-num {
      flex: none; width: 30px; height: 30px; border-radius: 50%;
      background: var(--panel-3); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 700;
    }
    .order-row.first { border-color: var(--accent); background: rgba(108,123,255,0.16); }
    .order-row.first .order-num { background: var(--accent); color: #fff; }
    .order-row .first-tag { margin-left: auto; font-size: 0.82rem; color: var(--accent); font-weight: 700; }

    /* Roster on reveal */
    .roster { display: flex; flex-direction: column; gap: 8px; }
    .roster .row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 12px 14px;
    }
    .roster .row .tag { font-size: 0.85rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .roster .row .tag.imp { background: rgba(255,93,108,0.18); color: var(--danger); }
    .roster .row .tag.ins { background: rgba(54,211,153,0.16); color: var(--good); }

    .fade-in { animation: fade 0.22s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
